name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version override (leave blank to use VERSION file)"
        required: false
        type: string

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # Tag push — use the pushed tag as the release version and warn
            # if it diverges from the VERSION file.
            raw_version="${GITHUB_REF_NAME#v}"
            file_version="$(cat VERSION)"
            if [[ "${raw_version}" != "${file_version}" ]]; then
              echo "Warning: tag ${GITHUB_REF_NAME} does not match VERSION file (${file_version})" >&2
            fi
          elif [[ -n "${{ inputs.version_override }}" ]]; then
            raw_version="${{ inputs.version_override }}"
            raw_version="${raw_version#v}"
          else
            raw_version="$(cat VERSION)"
          fi

          if [[ -z "${raw_version}" ]]; then
            echo "Release version must not be empty." >&2
            exit 1
          fi

          if [[ ! "${raw_version}" =~ ^[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Release version must look like 1.2.3 or 1.2.3-rc1." >&2
            exit 1
          fi

          echo "build_version=${raw_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=v${raw_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build release artifacts
        # VERSION file is the source of truth; no env-var override needed.
        run: python -m build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dormammu-dist
          path: |
            dist/*
            install.sh

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*
            install.sh
